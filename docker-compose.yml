services:
  nextjs-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: juriscribe-nextjs
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_proxy"
      - "traefik.http.routers.nextjs-app.rule=Host(`juriscribe.didierdjakoua.site`)"
      - "traefik.http.routers.nextjs-app.entrypoints=websecure"
      - "traefik.http.routers.nextjs-app.tls=true"
      - "traefik.http.services.nextjs-app.loadbalancer.server.port=3000"
    networks:
      - traefik_proxy
      - juriscribe_network

networks:
  traefik_proxy:
    external: true
  juriscribe_network:
    external: true
